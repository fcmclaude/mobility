<!DOCTYPE html>
<html lang="en">
<head>

  <title>Mobility</title>
  <link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;Mobility&quot;,&quot;short_name&quot;:&quot;Mobility&quot;,&quot;start_url&quot;:&quot;./index.html&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#0f0f0f&quot;,&quot;theme_color&quot;:&quot;#0f0f0f&quot;,&quot;icons&quot;:[{&quot;src&quot;:&quot;data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect fill='%230f0f0f' width='192' height='192'/%3E%3Ctext x='96' y='120' font-size='120' fill='%23e8763a' text-anchor='middle' font-family='system-ui'%3E%F0%9F%A7%98%3C/text%3E%3C/svg%3E&quot;,&quot;sizes&quot;:&quot;192x192&quot;,&quot;type&quot;:&quot;image/svg+xml&quot;,&quot;purpose&quot;:&quot;any&quot;}]}">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect fill='%230f0f0f' width='192' height='192'/%3E%3Ctext x='96' y='120' font-size='120' fill='%23e8763a' text-anchor='middle' font-family='system-ui'%3E%F0%9F%A7%98%3C/text%3E%3C/svg%3E">
  <apple-touch-icon href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect fill='%230f0f0f' width='180' height='180'/%3E%3Ctext x='90' y='110' font-size='100' fill='%23e8763a' text-anchor='middle' font-family='system-ui'%3E%F0%9F%A7%98%3C/text%3E%3C/svg%3E">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #0f0f0f;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      position: fixed;
      overflow: hidden;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
      background: #0f0f0f;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 80px;
      padding-top: 20px;
      padding-left: 16px;
      padding-right: 16px;
      padding-top: max(20px, env(safe-area-inset-top));
      padding-bottom: max(80px, calc(80px + env(safe-area-inset-bottom)));
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }

    .nav-button {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      cursor: pointer;
      color: #999;
      transition: color 0.3s;
      font-size: 12px;
    }

    .nav-button.active {
      color: #e8763a;
    }

    .nav-button svg {
      width: 24px;
      height: 24px;
    }

    .tab {
      display: none;
    }

    .tab.active {
      display: block;
    }

    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #e8763a;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .session-card {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      border: 1px solid #2a2a2a;
    }

    .session-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .session-icon {
      font-size: 32px;
    }

    .session-title {
      flex: 1;
    }

    .session-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .session-description {
      font-size: 12px;
      color: #999;
    }

    .exercises-preview {
      background: #0f0f0f;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .exercise-item-preview {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #2a2a2a;
      font-size: 14px;
    }

    .exercise-item-preview:last-child {
      border-bottom: none;
    }

    .exercise-duration {
      color: #999;
      font-size: 12px;
    }

    .start-button {
      background: #e8763a;
      color: #0f0f0f;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.3s;
      -webkit-user-select: none;
      user-select: none;
    }

    .start-button:active {
      background: #d65e24;
    }

    .notes-section {
      margin-top: 24px;
    }

    .notes-label {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      display: block;
    }

    .notes-textarea {
      background: #1a1a1a;
      color: #ffffff;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 12px;
      width: 100%;
      min-height: 80px;
      font-family: inherit;
      font-size: 14px;
      resize: none;
      -webkit-user-select: text;
      user-select: text;
    }

    .notes-textarea:focus {
      outline: none;
      border-color: #e8763a;
      background: #252525;
    }

    .progress-section {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .progress-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .week-mini-cal {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .day-box {
      aspect-ratio: 1;
      background: #0f0f0f;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid #2a2a2a;
    }

    .day-box.completed {
      background: #10b981;
      border-color: #10b981;
      font-weight: 600;
    }

    .day-box.today {
      border-color: #e8763a;
      color: #e8763a;
    }

    /* Calendar Tab */
    .calendar-container {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 20px;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .calendar-title {
      font-size: 18px;
      font-weight: 600;
    }

    .calendar-nav-btn {
      background: none;
      border: none;
      color: #e8763a;
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 24px;
    }

    .calendar-day-header {
      text-align: center;
      font-size: 12px;
      color: #999;
      font-weight: 600;
      padding: 8px 0;
      text-transform: uppercase;
    }

    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      font-size: 14px;
      position: relative;
    }

    .calendar-day.other-month {
      color: #555;
    }

    .calendar-day.today {
      border: 2px solid #e8763a;
      color: #e8763a;
      font-weight: 600;
    }

    .calendar-day.completed::after {
      content: '\2713';
      position: absolute;
      top: 2px;
      right: 4px;
      color: #10b981;
      font-size: 12px;
      font-weight: 700;
    }

    .calendar-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .cal-stat {
      background: #0f0f0f;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    /* History Tab */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .history-item {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 16px;
      border-left: 4px solid #e8763a;
    }

    .history-date {
      font-size: 12px;
      color: #999;
      margin-bottom: 4px;
    }

    .history-session {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .history-note {
      font-size: 13px;
      color: #ccc;
      font-style: italic;
    }

    /* Session Overlay */
    .session-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #0f0f0f;
      z-index: 1000;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .session-overlay.active {
      display: flex;
    }

    .session-header-bar {
      background: #1a1a1a;
      padding: 16px;
      padding-top: max(16px, env(safe-area-inset-top));
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a2a2a;
    }

    .session-close-btn {
      background: none;
      border: none;
      color: #999;
      font-size: 24px;
      cursor: pointer;
      padding: 4px;
    }

    .session-progress-text {
      font-size: 14px;
      font-weight: 500;
    }

    .session-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .exercise-animation {
      width: 180px;
      height: 180px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      border-radius: 20px;
    }

    .exercise-animation svg {
      width: 100%;
      height: 100%;
    }

    .timer-container {
      position: relative;
      width: 160px;
      height: 160px;
      margin-bottom: 24px;
    }

    .timer-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .timer-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-size: 44px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .timer-label {
      position: absolute;
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #999;
    }

    .exercise-name {
      font-size: 20px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
    }

    .exercise-side {
      font-size: 14px;
      color: #999;
      text-align: center;
      margin-bottom: 16px;
      min-height: 18px;
    }

    .exercise-cue {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
      max-width: 100%;
    }

    .exercise-up-next {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-bottom: 24px;
    }

    .controls {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
    }

    .control-btn {
      background: #1a1a1a;
      border: none;
      color: #e8763a;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .control-btn:active {
      background: #2a2a2a;
    }

    .control-btn.play-btn {
      background: #e8763a;
      color: #0f0f0f;
      width: 60px;
      height: 60px;
      font-size: 28px;
    }

    .control-btn.play-btn:active {
      background: #d65e24;
    }

    .control-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .session-complete {
      text-align: center;
      padding: 40px 20px;
    }

    .complete-emoji {
      font-size: 60px;
      margin-bottom: 16px;
    }

    .complete-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .complete-stats {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      margin: 24px 0;
      text-align: left;
    }

    .complete-stat-line {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #2a2a2a;
      font-size: 14px;
    }

    .complete-stat-line:last-child {
      border-bottom: none;
    }

    .complete-stat-label {
      color: #999;
    }

    .complete-stat-value {
      font-weight: 600;
      color: #e8763a;
    }

    .complete-btn {
      background: #e8763a;
      color: #0f0f0f;
      border: none;
      border-radius: 12px;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 24px;
    }

    .complete-btn:active {
      background: #d65e24;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="content" id="mainContent">
      <!-- Today Tab -->
      <div class="tab active" id="todayTab">
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-value" id="streakValue">0</div>
            <div class="stat-label">Day Streak</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="sessionsValue">0</div>
            <div class="stat-label">Sessions</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="minutesValue">0</div>
            <div class="stat-label">Minutes</div>
          </div>
        </div>

        <div class="progress-section">
          <div class="progress-title">This Week</div>
          <div class="week-mini-cal" id="weekMiniCal"></div>
        </div>

        <div class="session-card" id="todaySessionCard">
          <!-- Populated by JS -->
        </div>

        <div class="notes-section">
          <label class="notes-label">Notes</label>
          <textarea class="notes-textarea" id="notesTextarea" placeholder="How did it feel? Any adjustments needed?"></textarea>
        </div>
      </div>

      <!-- Calendar Tab -->
      <div class="tab" id="calendarTab">
        <div class="calendar-container">
          <div class="calendar-header">
            <button class="calendar-nav-btn" id="prevMonthBtn">&#10094;</button>
            <div class="calendar-title" id="monthTitle"></div>
            <button class="calendar-nav-btn" id="nextMonthBtn">&#10095;</button>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
          <div class="calendar-stats">
            <div class="cal-stat">
              <div class="stat-value" id="calSessions">0</div>
              <div class="stat-label">Sessions</div>
            </div>
            <div class="cal-stat">
              <div class="stat-value" id="calMinutes">0</div>
              <div class="stat-label">Minutes</div>
            </div>
          </div>
        </div>
      </div>

      <!-- History Tab -->
      <div class="tab" id="historyTab">
        <div class="history-list" id="historyList">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <button class="nav-button active" id="todayNav" data-tab="todayTab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        <span>Today</span>
      </button>
      <button class="nav-button" id="calendarNav" data-tab="calendarTab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span>Calendar</span>
      </button>
      <button class="nav-button" id="historyNav" data-tab="historyTab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 8v4l3 2m6-2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <span>History</span>
      </button>
    </div>
  </div>

  <!-- Session Overlay -->
  <div class="session-overlay" id="sessionOverlay">
    <div class="session-header-bar">
      <button class="session-close-btn" id="sessionCloseBtn">&#10005;</button>
      <div class="session-progress-text" id="sessionProgress">1 / 10</div>
      <div style="width: 30px;"></div>
    </div>
    <div class="session-content" id="sessionContent">
      <!-- Populated by JS -->
    </div>
  </div>

  <script>
    // Data
    const SESSIONS = [
      {
        id: 'hip-opener',
        name: 'Hip Opener Flow',
        description: 'Open up tight hip flexors and improve external rotation \u2014 key areas for runners.',
        icon: '\uD83D\uDD13',
        color: '#e8763a',
        exercises: [
          { name: 'Hip Circles', duration: 40, sides: true, cue: 'Stand on one leg, draw big circles with the other knee. Controlled and smooth.', sideCue: ['Left leg circles', 'Right leg circles'] },
          { name: "World's Greatest Stretch", duration: 50, sides: true, cue: 'Lunge forward, plant opposite hand, rotate torso up. Feel the hip flexor open.', sideCue: ['Left side', 'Right side'] },
          { name: '90/90 Stretch', duration: 50, sides: true, cue: 'Sit with both knees at 90 degrees. Lean gently into the front hip. Don\'t force it \u2014 breathe into the tightness.', sideCue: ['Left hip forward', 'Right hip forward'] },
          { name: 'Low Lunge Hip Flexor', duration: 50, sides: true, cue: 'Back knee down, front foot flat. Squeeze the back glute and shift forward. Arms overhead to deepen.', sideCue: ['Left hip flexor', 'Right hip flexor'] },
          { name: 'Butterfly Stretch', duration: 50, sides: false, cue: 'Soles of feet together, knees out. Sit tall and gently press knees down with elbows. Hinge at the hips.' },
          { name: 'Pigeon Pose', duration: 60, sides: true, cue: 'Front shin across, back leg extended. Stay upright or fold forward. Let gravity do the work.', sideCue: ['Left leg forward', 'Right leg forward'] },
        ]
      },
      {
        id: 'posterior-chain',
        name: 'Posterior Chain Release',
        description: 'Target hamstrings, glutes, and piriformis \u2014 critical for sciatica relief.',
        icon: '\uD83D\uDD17',
        color: '#6366f1',
        exercises: [
          { name: 'Cat-Cow', duration: 60, sides: false, cue: 'On all fours, alternate between arching and rounding your back. Sync with breath \u2014 inhale arch, exhale round.' },
          { name: 'Figure-4 Stretch', duration: 55, sides: true, cue: 'Lie on your back, cross ankle over opposite knee. Pull the bottom leg toward you. Feel the deep glute stretch.', sideCue: ['Left glute', 'Right glute'] },
          { name: 'Seated Forward Fold', duration: 55, sides: false, cue: 'Legs straight ahead, hinge from the hips \u2014 not the lower back. Reach for your shins or feet.' },
          { name: 'Supine Hamstring Stretch', duration: 50, sides: true, cue: 'Lie on your back, one leg up. Use hands or a towel behind the thigh. Keep the leg as straight as comfortable.', sideCue: ['Left hamstring', 'Right hamstring'] },
          { name: 'Glute Bridge Hold', duration: 50, sides: false, cue: 'Feet flat, drive hips up. Squeeze glutes hard at the top. Hold steady \u2014 don\'t let hips sag.' },
          { name: 'Lying Spinal Twist', duration: 55, sides: true, cue: 'Knees stacked to one side, arms out in a T. Let the weight of your legs pull you into the twist.', sideCue: ['Knees to left', 'Knees to right'] },
        ]
      },
      {
        id: 'dynamic-mobility',
        name: 'Dynamic Mobility',
        description: 'Movement-based session to warm up joints through their full range of motion.',
        icon: '\u26A1',
        color: '#f59e0b',
        exercises: [
          { name: 'Leg Swings (Front-Back)', duration: 30, sides: true, cue: 'Hold something for balance. Swing the leg like a pendulum \u2014 relaxed, controlled, increasing range.', sideCue: ['Left leg swings', 'Right leg swings'] },
          { name: 'Leg Swings (Side-Side)', duration: 30, sides: true, cue: 'Face a wall, swing the leg across your body and out. Keep your hips square.', sideCue: ['Left leg swings', 'Right leg swings'] },
          { name: 'Walking Lunges + Twist', duration: 60, sides: false, cue: 'Step into a deep lunge, rotate your torso toward the front leg. Alternate legs.' },
          { name: 'Inchworms', duration: 60, sides: false, cue: 'From standing, walk hands out to plank. Walk feet back toward hands. Keep legs as straight as possible.' },

            state.notes = data.notes || {};
          }

        }

        try {

    // Audio helpers
    const SoundEngine = {
      init() {
        if (!state.audioContext) {
          try {
            const AC = window.AudioContext || window.webkitAudioContext;
            state.audioContext = new AC();
          } catch (e) {
            console.log('AudioContext not available');
          }
        }
      },
      tick() {
        if (!state.audioContext) return;
        const ctx = state.audioContext;
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 800;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
      },
      chime() {
        if (!state.audioContext) return;
        const ctx = state.audioContext;
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(1000, now);
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.3);
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.3);
      },
      complete() {
        if (!state.audioContext) return;
        const ctx = state.audioContext;
        const now = ctx.currentTime;
        [523, 659, 784].forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = freq;
          osc.type = 'sine';
          gain.gain.setValueAtTime(0.1, now + i * 0.05);
          gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.05 + 0.3);
          osc.start(now + i * 0.05);
          osc.stop(now + i * 0.05 + 0.3);
        });
      }
    };

    // Get today's session
    function getTodaySession() {
      const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
      return SESSIONS[dayOfYear % SESSIONS.length];
    }

    // Calculate stats
    function getStats() {
      let dayStreak = 0;
      let today = new Date();
      today.setHours(0, 0, 0, 0);

      for (let i = 0; i < 365; i++) {
        const checkDate = new Date(today);
        checkDate.setDate(checkDate.getDate() - i);
        const checkStr = checkDate.toISOString().split('T')[0];
        if (state.completedDays.includes(checkStr)) {
          dayStreak++;
        } else if (i > 0) {
          break;
        }
      }

      let totalMinutes = 0;
      state.completedDays.forEach(dayStr => {
        const dayOfYear = Math.floor((new Date(dayStr) - new Date(new Date(dayStr).getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
        const session = SESSIONS[dayOfYear % SESSIONS.length];
        session.exercises.forEach(ex => {
          totalMinutes += Math.ceil(ex.duration / 60);
        });
      });

      return {
        dayStreak,
        totalSessions: state.completedDays.length,
        totalMinutes
      };
    }

    // Get last 7 days
    function getLastSevenDays() {
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        date.setHours(0, 0, 0, 0);
        const dateStr = date.toISOString().split('T')[0];
        days.push({
          date: dateStr,
          completed: state.completedDays.includes(dateStr),
          dayOfWeek: date.toLocaleDateString('en', { weekday: 'short' }).toUpperCase().charAt(0)
        });
      }
      return days;
    }

    // Render UI
    function renderToday() {
      const stats = getStats();
      document.getElementById('streakValue').textContent = stats.dayStreak;
      document.getElementById('sessionsValue').textContent = stats.totalSessions;
      document.getElementById('minutesValue').textContent = stats.totalMinutes;

      const lastSeven = getLastSevenDays();
      document.getElementById('weekMiniCal').innerHTML = lastSeven.map((day, idx) => `
        <div class="day-box ${day.completed ? 'completed' : ''} ${idx === 6 ? 'today' : ''}">
          ${day.dayOfWeek}
        </div>
      `).join('');

      const todaySession = getTodaySession();
      const totalDuration = todaySession.exercises.reduce((sum, ex) => {
        const sides = ex.sides ? 2 : 1;
        return sum + (ex.duration * sides);
      }, 0);
      const totalMinutes = Math.ceil(totalDuration / 60);

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const todayStr = today.toISOString().split('T')[0];
      const isCompleted = state.completedDays.includes(todayStr);

      document.getElementById('todaySessionCard').innerHTML = `
        <div class="session-header">
          <div class="session-icon">${todaySession.icon}</div>
          <div class="session-title">
            <div class="session-name">${todaySession.name}</div>
            <div class="session-description">${todaySession.description}</div>
          </div>
        </div>
        <div class="exercises-preview">
          ${todaySession.exercises.map(ex => `
            <div class="exercise-item-preview">
              <span>${ex.name}</span>
              <span class="exercise-duration">${ex.duration}s${ex.sides ? ' x 2' : ''}</span>
            </div>
          `).join('')}
        </div>
        <div style="background: #0f0f0f; border-radius: 12px; padding: 12px; text-align: center; margin-bottom: 16px; font-size: 13px; color: #999;">
          Total: ${totalMinutes} min
        </div>
        <button class="start-button" id="startSessionBtn" ${isCompleted ? 'style="opacity: 0.7;"' : ''}>
          ${isCompleted ? '\u2713 Completed Today' : 'Start Session'}
        </button>
      `;

      const notesArea = document.getElementById('notesTextarea');
      notesArea.value = state.notes[todayStr] || '';
      notesArea.addEventListener('input', (e) => {
        state.notes[todayStr] = e.target.value;
        Storage.save();
      });

      document.getElementById('startSessionBtn').addEventListener('click', startSession);
    }

    function renderCalendar() {
      const year = state.currentMonth.getFullYear();
      const month = state.currentMonth.getMonth();
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const daysInMonth = lastDay.getDate();
      const startingDayOfWeek = firstDay.getDay();

      document.getElementById('monthTitle').textContent = state.currentMonth.toLocaleDateString('en', { month: 'long', year: 'numeric' });

      const monthStats = { sessions: 0, minutes: 0 };
      const calendarGrid = [];

      for (let i = 0; i < startingDayOfWeek; i++) {
        calendarGrid.push('<div class="calendar-day other-month"></div>');
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const todayStr = today.toISOString().split('T')[0];

      for (let i = 1; i <= daysInMonth; i++) {
        const date = new Date(year, month, i);
        date.setHours(0, 0, 0, 0);
        const dateStr = date.toISOString().split('T')[0];
        const isCompleted = state.completedDays.includes(dateStr);
        const isToday = dateStr === todayStr;

        if (isCompleted) {
          const dayOfYear = Math.floor((new Date(dateStr) - new Date(new Date(dateStr).getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
          const session = SESSIONS[dayOfYear % SESSIONS.length];
          const sessionMinutes = Math.ceil(session.exercises.reduce((sum, ex) => sum + ex.duration * (ex.sides ? 2 : 1), 0) / 60);
          monthStats.sessions++;
          monthStats.minutes += sessionMinutes;
        }

        calendarGrid.push(`
          <div class="calendar-day ${isCompleted ? 'completed' : ''} ${isToday ? 'today' : ''}">
            ${i}
          </div>
        `);
      }

      document.getElementById('calendarGrid').innerHTML = calendarGrid.join('');
      document.getElementById('calSessions').textContent = monthStats.sessions;
      document.getElementById('calMinutes').textContent = monthStats.minutes;
    }

    function renderHistory() {
      const sortedDays = [...state.completedDays].reverse();
      const historyItems = sortedDays.slice(0, 30).map(dayStr => {
        const date = new Date(dayStr + 'T00:00:00');
        const dayOfYear = Math.floor((new Date(dayStr) - new Date(new Date(dayStr).getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
        const session = SESSIONS[dayOfYear % SESSIONS.length];
        const note = state.notes[dayStr];
        return `
          <div class="history-item">
            <div class="history-date">${date.toLocaleDateString('en', { month: 'short', day: 'numeric', weekday: 'short' })}</div>
            <div class="history-session">${session.icon} ${session.name}</div>
            ${note ? `<div class="history-note">"${note}"</div>` : ''}
          </div>
        `;
      });

      document.getElementById('historyList').innerHTML = historyItems.length > 0
        ? historyItems.join('')
        : '<div style="text-align: center; padding: 40px 20px; color: #999;">No completed sessions yet. Start one today!</div>';
    }

    // Session logic
    function startSession() {
      SoundEngine.init();
      state.currentSession = getTodaySession();
      state.currentExerciseIndex = 0;
      state.currentSideIndex = 0;
      state.isPlaying = true;

      document.getElementById('sessionOverlay').classList.add('active');
      document.body.style.overflow = 'hidden';

      const firstExercise = state.currentSession.exercises[0];
      state.timeRemaining = firstExercise.duration;

      renderSessionContent();
      startTimer();
      SoundEngine.chime();

      if (navigator.wakeLock) {
        try {
          navigator.wakeLock.request('screen');
        } catch (e) {
          console.log('Wake lock failed:', e);
        }
      }
    }

    function renderSessionContent() {
      const exercise = state.currentSession.exercises[state.currentExerciseIndex];
      const totalExercises = state.currentSession.exercises.reduce((sum, ex) => sum + (ex.sides ? 2 : 1), 0);
      let currentStep = 1;
      for (let i = 0; i < state.currentExerciseIndex; i++) {
        currentStep += state.currentSession.exercises[i].sides ? 2 : 1;
      }
      currentStep += state.currentSideIndex;

      const sideCue = exercise.sides ? exercise.sideCue[state.currentSideIndex] : '';
      const cue = exercise.cue;

      let nextExerciseName = '';
      if (state.currentSideIndex + 1 < (exercise.sides ? 2 : 1)) {
        nextExerciseName = exercise.name;
      } else if (state.currentExerciseIndex < state.currentSession.exercises.length - 1) {
        nextExerciseName = state.currentSession.exercises[state.currentExerciseIndex + 1].name;
      }

      const timerColor = state.currentSession.color;

      document.getElementById('sessionProgress').textContent = `${currentStep} / ${totalExercises}`;
      document.getElementById('sessionContent').innerHTML = `
        ${getExerciseSVG(exercise.name, timerColor)}
        <div class="timer-container">
          <svg class="timer-svg" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="45" fill="none" stroke="#2a2a2a" stroke-width="2" />
            <circle id="timerCircle" cx="50" cy="50" r="45" fill="none" stroke="${timerColor}" stroke-width="2" stroke-dasharray="282.74" stroke-dashoffset="282.74" stroke-linecap="round" />
          </svg>
          <div class="timer-text" id="timerText">${state.timeRemaining}</div>
          <div class="timer-label">seconds</div>
        </div>
        <div class="exercise-name">${exercise.name}</div>
        <div class="exercise-side">${sideCue}</div>
        <div class="exercise-cue">${cue}</div>
        <div class="exercise-up-next">${nextExerciseName ? 'Up next: ' + nextExerciseName : 'Final stretch!'}</div>
        <div class="controls">
          <button class="control-btn" id="prevBtn">&#10094;</button>
          <button class="control-btn play-btn" id="playBtn">${state.isPlaying ? '\u23F8' : '\u25B6'}</button>
          <button class="control-btn" id="skipBtn">&#10095;</button>
        </div>
      `;

      document.getElementById('prevBtn').addEventListener('click', previousExercise);
      document.getElementById('playBtn').addEventListener('click', togglePlay);
      document.getElementById('skipBtn').addEventListener('click', nextExercise);
    }

    function startTimer() {
      if (state.timerInterval) clearInterval(state.timerInterval);

      state.timerInterval = setInterval(() => {
        if (!state.isPlaying) return;

        state.timeRemaining--;
        document.getElementById('timerText').textContent = state.timeRemaining;

        const exercise = state.currentSession.exercises[state.currentExerciseIndex];
        const totalDuration = exercise.duration;
        const circumference = 282.74;
        const offset = circumference * (1 - state.timeRemaining / totalDuration);
        const circle = document.getElementById('timerCircle');
        if (circle) {
          circle.style.strokeDashoffset = offset;
        }

        if (state.timeRemaining <= 3 && state.timeRemaining > 0) {
          SoundEngine.tick();
        }

        if (state.timeRemaining === 0) {
          SoundEngine.chime();
          nextExercise();
        }
      }, 1000);
    }

    function togglePlay() {
      state.isPlaying = !state.isPlaying;
      const btn = document.getElementById('playBtn');
      if (btn) {
        btn.textContent = state.isPlaying ? '\u23F8' : '\u25B6';
      }
      if (state.isPlaying) {
        startTimer();
      } else if (state.timerInterval) {
        clearInterval(state.timerInterval);
      }
    }

    function nextExercise() {
      const exercise = state.currentSession.exercises[state.currentExerciseIndex];
      if (exercise.sides && state.currentSideIndex + 1 < 2) {
        state.currentSideIndex++;
      } else {
        state.currentExerciseIndex++;
        state.currentSideIndex = 0;

        if (state.currentExerciseIndex >= state.currentSession.exercises.length) {
          completeSession();
          return;
        }
      }

      const nextEx = state.currentSession.exercises[state.currentExerciseIndex];
      state.timeRemaining = nextEx.duration;
      renderSessionContent();
      if (state.isPlaying) startTimer();
    }

    function previousExercise() {
      if (state.currentSideIndex > 0) {
        state.currentSideIndex--;
      } else if (state.currentExerciseIndex > 0) {
        state.currentExerciseIndex--;
        const prevEx = state.currentSession.exercises[state.currentExerciseIndex];
        state.currentSideIndex = prevEx.sides ? 1 : 0;
      } else {
        return;
      }

      const prevEx = state.currentSession.exercises[state.currentExerciseIndex];
      state.timeRemaining = prevEx.duration;
      renderSessionContent();
      if (state.isPlaying) startTimer();
    }

    function completeSession() {
      if (state.timerInterval) clearInterval(state.timerInterval);

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const todayStr = today.toISOString().split('T')[0];

      if (!state.completedDays.includes(todayStr)) {
        state.completedDays.push(todayStr);
      }
      Storage.save();

      SoundEngine.complete();

      const totalDuration = state.currentSession.exercises.reduce((sum, ex) => {
        return sum + (ex.duration * (ex.sides ? 2 : 1));
      }, 0);
      const totalMinutes = Math.ceil(totalDuration / 60);

      document.getElementById('sessionContent').innerHTML = `
        <div class="session-complete">
          <div class="complete-emoji">\uD83C\uDF89</div>
          <div class="complete-title">Awesome Work!</div>
          <div style="font-size: 14px; color: #999; margin-bottom: 24px;">${state.currentSession.name}</div>
          <div class="complete-stats">
            <div class="complete-stat-line">
              <span class="complete-stat-label">Duration</span>
              <span class="complete-stat-value">${totalMinutes} min</span>
            </div>
            <div class="complete-stat-line">
              <span class="complete-stat-label">Exercises</span>
              <span class="complete-stat-value">${state.currentSession.exercises.length}</span>
            </div>
            <div class="complete-stat-line">
              <span class="complete-stat-label">Streak</span>
              <span class="complete-stat-value">${getStats().dayStreak} days \uD83D\uDD25</span>
            </div>
          </div>
          <button class="complete-btn" id="completeBtn">Done</button>
        </div>
      `;

      document.getElementById('completeBtn').addEventListener('click', closeSession);
    }

    function closeSession() {
      if (state.timerInterval) clearInterval(state.timerInterval);
      state.currentSession = null;
      document.getElementById('sessionOverlay').classList.remove('active');
      document.body.style.overflow = '';
      renderToday();
      renderCalendar();
      renderHistory();
    }

    // Navigation
    function switchTab(tabId) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');

      document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');

      if (tabId === 'calendarTab') renderCalendar();
      if (tabId === 'historyTab') renderHistory();
    }

    document.getElementById('todayNav').addEventListener('click', () => switchTab('todayTab'));
    document.getElementById('calendarNav').addEventListener('click', () => switchTab('calendarTab'));
    document.getElementById('historyNav').addEventListener('click', () => switchTab('historyTab'));

    document.getElementById('prevMonthBtn').addEventListener('click', () => {
      state.currentMonth.setMonth(state.currentMonth.getMonth() - 1);
      renderCalendar();
    });

    document.getElementById('nextMonthBtn').addEventListener('click', () => {
      state.currentMonth.setMonth(state.currentMonth.getMonth() + 1);
      renderCalendar();
    });

    document.getElementById('sessionCloseBtn').addEventListener('click', closeSession);

    // Init
    Storage.load();
    renderToday();
  </script>
</body>
</html>
