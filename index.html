<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, minimum-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mobility">
  <meta name="theme-color" content="#0f0f0f">
  <title>Mobility</title>
  <link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;Mobility&quot;,&quot;short_name&quot;:&quot;Mobility&quot;,&quot;start_url&quot;:&quot;./mobility-app.html&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#0f0f0f&quot;,&quot;theme_color&quot;:&quot;#0f0f0f&quot;,&quot;icons&quot;:[{&quot;src&quot;:&quot;data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect fill='%230f0f0f' width='192' height='192'/%3E%3Ctext x='96' y='120' font-size='120' fill='%23e8763a' text-anchor='middle' font-family='system-ui'%3E%F0%9F%A7%98%3C/text%3E%3C/svg%3E&quot;,&quot;sizes&quot;:&quot;192x192&quot;,&quot;type&quot;:&quot;image/svg+xml&quot;,&quot;purpose&quot;:&quot;any&quot;}]}">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect fill='%230f0f0f' width='192' height='192'/%3E%3Ctext x='96' y='120' font-size='120' fill='%23e8763a' text-anchor='middle' font-family='system-ui'%3E%F0%9F%A7%98%3C/text%3E%3C/svg%3E">
  <apple-touch-icon href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect fill='%230f0f0f' width='180' height='180'/%3E%3Ctext x='90' y='110' font-size='100' fill='%23e8763a' text-anchor='middle' font-family='system-ui'%3E%F0%9F%A7%98%3C/text%3E%3C/svg%3E">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #0f0f0f;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      position: fixed;
      overflow: hidden;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
      background: #0f0f0f;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 80px;
      padding-top: 20px;
      padding-left: 16px;
      padding-right: 16px;
      padding-top: max(20px, env(safe-area-inset-top));
      padding-bottom: max(80px, calc(80px + env(safe-area-inset-bottom)));
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }

    .nav-button {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      cursor: pointer;
      color: #999;
      transition: color 0.3s;
      font-size: 12px;
    }

    .nav-button.active {
      color: #e8763a;
    }

    .nav-button svg {
      width: 24px;
      height: 24px;
    }

    .tab {
      display: none;
    }

    .tab.active {
      display: block;
    }

    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #e8763a;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .session-card {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      border: 1px solid #2a2a2a;
    }

    .session-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .session-icon {
      font-size: 32px;
    }

    .session-title {
      flex: 1;
    }

    .session-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .session-description {
      font-size: 12px;
      color: #999;
    }

    .exercises-preview {
      background: #0f0f0f;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .exercise-item-preview {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #2a2a2a;
      font-size: 14px;
    }

    .exercise-item-preview:last-child {
      border-bottom: none;
    }

    .exercise-duration {
      color: #999;
      font-size: 12px;
    }

    .start-button {
      background: #e8763a;
      color: #0f0f0f;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.3s;
      -webkit-user-select: none;
      user-select: none;
    }

    .start-button:active {
      background: #d65e24;
    }

    .notes-section {
      margin-top: 24px;
    }

    .notes-label {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      display: block;
    }

    .notes-textarea {
      background: #1a1a1a;
      color: #ffffff;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 12px;
      width: 100%;
      min-height: 80px;
      font-family: inherit;
      font-size: 14px;
      resize: none;
      -webkit-user-select: text;
      user-select: text;
    }

    .notes-textarea:focus {
      outline: none;
      border-color: #e8763a;
      background: #252525;
    }

    .progress-section {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .progress-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .week-mini-cal {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .day-box {
      aspect-ratio: 1;
      background: #0f0f0f;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid #2a2a2a;
    }

    .day-box.completed {
      background: #10b981;
      border-color: #10b981;
      font-weight: 600;
    }

    .day-box.today {
      border-color: #e8763a;
      color: #e8763a;
    }

    /* Calendar Tab */
    .calendar-container {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 20px;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .calendar-title {
      font-size: 18px;
      font-weight: 600;
    }

    .calendar-nav-btn {
      background: none;
      border: none;
      color: #e8763a;
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 24px;
    }

    .calendar-day-header {
      text-align: center;
      font-size: 12px;
      color: #999;
      font-weight: 600;
      padding: 8px 0;
      text-transform: uppercase;
    }

    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      font-size: 14px;
      position: relative;
    }

    .calendar-day.other-month {
      color: #555;
    }

    .calendar-day.today {
      border: 2px solid #e8763a;
      color: #e8763a;
      font-weight: 600;
    }

    .calendar-day.completed::after {
      content: '✓';
      position: absolute;
      top: 2px;
      right: 4px;
      color: #10b981;
      font-size: 12px;
      font-weight: 700;
    }

    .calendar-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .cal-stat {
      background: #0f0f0f;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    /* History Tab */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .history-item {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 16px;
      border-left: 4px solid #e8763a;
    }

    .history-date {
      font-size: 12px;
      color: #999;
      margin-bottom: 4px;
    }

    .history-session {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .history-note {
      font-size: 13px;
      color: #ccc;
      font-style: italic;
    }

    /* Session Overlay */
    .session-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #0f0f0f;
      z-index: 1000;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .session-overlay.active {
      display: flex;
    }

    .session-header-bar {
      background: #1a1a1a;
      padding: 16px;
      padding-top: max(16px, env(safe-area-inset-top));
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a2a2a;
    }

    .session-close-btn {
      background: none;
      border: none;
      color: #999;
      font-size: 24px;
      cursor: pointer;
      padding: 4px;
    }

    .session-progress-text {
      font-size: 14px;
      font-weight: 500;
    }

    .session-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .exercise-animation {
      width: 140px;
      height: 140px;
      margin-bottom: 24px;
    }

    .timer-container {
      position: relative;
      width: 180px;
      height: 180px;
      margin-bottom: 32px;
    }

    .timer-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .timer-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-size: 48px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .timer-label {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #999;
    }

    .exercise-name {
      font-size: 20px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
    }

    .exercise-side {
      font-size: 14px;
      color: #999;
      text-align: center;
      margin-bottom: 16px;
      min-height: 18px;
    }

    .exercise-cue {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
      max-width: 100%;
    }

    .exercise-up-next {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-bottom: 24px;
    }

    .controls {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
    }

    .control-btn {
      background: #1a1a1a;
      border: none;
      color: #e8763a;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .control-btn:active {
      background: #2a2a2a;
    }

    .control-btn.play-btn {
      background: #e8763a;
      color: #0f0f0f;
      width: 60px;
      height: 60px;
      font-size: 28px;
    }

    .control-btn.play-btn:active {
      background: #d65e24;
    }

    .control-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .session-complete {
      text-align: center;
      padding: 40px 20px;
    }

    .complete-emoji {
      font-size: 60px;
      margin-bottom: 16px;
    }

    .complete-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .complete-stats {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      margin: 24px 0;
      text-align: left;
    }

    .complete-stat-line {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #2a2a2a;
      font-size: 14px;
    }

    .complete-stat-line:last-child {
      border-bottom: none;
    }

    .complete-stat-label {
      color: #999;
    }

    .complete-stat-value {
      font-weight: 600;
      color: #e8763a;
    }

    .complete-btn {
      background: #e8763a;
      color: #0f0f0f;
      border: none;
      border-radius: 12px;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 24px;
    }

    .complete-btn:active {
      background: #d65e24;
    }

    /* Animations */
    @keyframes standing-circle {
      0% { transform: translateX(0); }
      25% { transform: translateX(30px) translateY(-30px); }
      50% { transform: translateX(0) translateY(-40px); }
      75% { transform: translateX(-30px) translateY(-30px); }
      100% { transform: translateX(0); }
    }

    @keyframes lunge-twist {
      0% { transform: skewY(0); }
      50% { transform: skewY(-8deg) rotateZ(15deg); }
      100% { transform: skewY(0); }
    }

    @keyframes seated-90 {
      0% { transform: translateY(0); }
      50% { transform: translateY(10px); }
      100% { transform: translateY(0); }
    }

    @keyframes low-lunge {
      0% { transform: translateY(0) scaleY(1); }
      50% { transform: translateY(-15px) scaleY(0.9); }
      100% { transform: translateY(0) scaleY(1); }
    }

    @keyframes butterfly {
      0% { transform: scaleX(1); }
      50% { transform: scaleX(1.2); }
      100% { transform: scaleX(1); }
    }

    @keyframes pigeon {
      0% { transform: rotateZ(0); }
      50% { transform: rotateZ(-15deg); }
      100% { transform: rotateZ(0); }
    }

    @keyframes cat-cow {
      0% { transform: scaleY(1) translateY(0); }
      50% { transform: scaleY(0.8) translateY(10px); }
      100% { transform: scaleY(1) translateY(0); }
    }

    @keyframes figure-4 {
      0% { transform: rotateZ(0); }
      50% { transform: rotateZ(20deg); }
      100% { transform: rotateZ(0); }
    }

    @keyframes forward-fold {
      0% { transform: translateY(0); }
      50% { transform: translateY(20px); }
      100% { transform: translateY(0); }
    }

    @keyframes lying-leg-up {
      0% { transform: translateY(0) rotateZ(0); }
      50% { transform: translateY(-20px) rotateZ(10deg); }
      100% { transform: translateY(0) rotateZ(0); }
    }

    @keyframes bridge {
      0% { transform: scaleY(1) translateY(0); }
      50% { transform: scaleY(1.15) translateY(-15px); }
      100% { transform: scaleY(1) translateY(0); }
    }

    @keyframes spinal-twist {
      0% { transform: rotateZ(0); }
      50% { transform: rotateZ(25deg); }
      100% { transform: rotateZ(0); }
    }

    @keyframes leg-swing {
      0% { transform: rotateZ(0); }
      25% { transform: rotateZ(35deg); }
      50% { transform: rotateZ(0); }
      75% { transform: rotateZ(-35deg); }
      100% { transform: rotateZ(0); }
    }

    @keyframes inchworm {
      0% { transform: scaleX(1) scaleY(0.8); }
      50% { transform: scaleX(0.7) scaleY(1.2); }
      100% { transform: scaleX(1) scaleY(0.8); }
    }

    @keyframes cossack {
      0% { transform: translateX(0) scaleX(1); }
      50% { transform: translateX(35px) scaleX(1.1); }
      100% { transform: translateX(0) scaleX(1); }
    }

    @keyframes bear-crawl {
      0% { transform: translateY(0) scaleY(1); }
      50% { transform: translateY(-10px) scaleY(0.9); }
      100% { transform: translateY(0) scaleY(1); }
    }

    @keyframes deep-squat {
      0% { transform: scaleY(1); }
      50% { transform: scaleY(0.75); }
      100% { transform: scaleY(1); }
    }

    @keyframes child-pose {
      0% { transform: translateY(0); }
      50% { transform: translateY(15px); }
      100% { transform: translateY(0); }
    }

    @keyframes frog {
      0% { transform: scaleX(1) scaleY(1); }
      50% { transform: scaleX(1.2) scaleY(0.9); }
      100% { transform: scaleX(1) scaleY(1); }
    }

    @keyframes standing-quad {
      0% { transform: rotateZ(0); }
      50% { transform: rotateZ(30deg); }
      100% { transform: rotateZ(0); }
    }

    @keyframes wall-calf {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    @keyframes cross-body {
      0% { transform: translateX(0) rotateZ(0); }
      50% { transform: translateX(-30px) rotateZ(15deg); }
      100% { transform: translateX(0) rotateZ(0); }
    }

    @keyframes thread-needle {
      0% { transform: rotateZ(0); }
      50% { transform: rotateZ(-40deg); }
      100% { transform: rotateZ(0); }
    }

    @keyframes sphinx {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    @keyframes seated-twist {
      0% { transform: rotateZ(0); }
      50% { transform: rotateZ(30deg); }
      100% { transform: rotateZ(0); }
    }

    @keyframes bird-dog {
      0% { transform: rotateZ(0) translateY(0); }
      50% { transform: rotateZ(-15deg) translateY(-10px); }
      100% { transform: rotateZ(0) translateY(0); }
    }

    @keyframes dead-bug {
      0% { transform: scaleY(1); }
      50% { transform: scaleY(0.85); }
      100% { transform: scaleY(1); }
    }

    @keyframes foam-roll {
      0% { transform: translateY(0); }
      50% { transform: translateY(10px); }
      100% { transform: translateY(0); }
    }

    @keyframes spinal-wave {
      0% { transform: translateY(0) rotateZ(0); }
      50% { transform: translateY(-20px) rotateZ(10deg); }
      100% { transform: translateY(0) rotateZ(0); }
    }

    @keyframes half-splits {
      0% { transform: rotateZ(0) translateY(0); }
      50% { transform: rotateZ(-20deg) translateY(-15px); }
      100% { transform: rotateZ(0) translateY(0); }
    }

    @keyframes ankle-circle {
      0% { transform: rotateZ(0); }
      25% { transform: rotateZ(90deg); }
      50% { transform: rotateZ(180deg); }
      75% { transform: rotateZ(270deg); }
      100% { transform: rotateZ(360deg); }
    }

    .anim-standing-circle { animation: standing-circle 2s ease-in-out infinite; }
    .anim-lunge-twist { animation: lunge-twist 2s ease-in-out infinite; }
    .anim-seated-90 { animation: seated-90 2s ease-in-out infinite; }
    .anim-low-lunge { animation: low-lunge 2s ease-in-out infinite; }
    .anim-butterfly { animation: butterfly 2s ease-in-out infinite; }
    .anim-pigeon { animation: pigeon 2s ease-in-out infinite; }
    .anim-cat-cow { animation: cat-cow 2s ease-in-out infinite; }
    .anim-figure-4 { animation: figure-4 2s ease-in-out infinite; }
    .anim-forward-fold { animation: forward-fold 2s ease-in-out infinite; }
    .anim-lying-leg-up { animation: lying-leg-up 2s ease-in-out infinite; }
    .anim-bridge { animation: bridge 2s ease-in-out infinite; }
    .anim-spinal-twist { animation: spinal-twist 2s ease-in-out infinite; }
    .anim-leg-swing { animation: leg-swing 2.4s ease-in-out infinite; }
    .anim-inchworm { animation: inchworm 2s ease-in-out infinite; }
    .anim-cossack { animation: cossack 2s ease-in-out infinite; }
    .anim-bear-crawl { animation: bear-crawl 2s ease-in-out infinite; }
    .anim-deep-squat { animation: deep-squat 2s ease-in-out infinite; }
    .anim-child-pose { animation: child-pose 2s ease-in-out infinite; }
    .anim-frog { animation: frog 2s ease-in-out infinite; }
    .anim-standing-quad { animation: standing-quad 2s ease-in-out infinite; }
    .anim-wall-calf { animation: wall-calf 2s ease-in-out infinite; }
    .anim-cross-body { animation: cross-body 2s ease-in-out infinite; }

    // State
    let state = {
      completedDays: [],
      notes: {},
      currentSession: null,
      currentExerciseIndex: 0,
      currentSideIndex: 0,
      timeRemaining: 0,
      isPlaying: false,
      timerInterval: null,
      currentMonth: new Date(),
      audioContext: null
    };

    // Storage helpers
    const Storage = {
      load() {
        try {
          const saved = localStorage.getItem('mobilityAppState');
          if (saved) {
            const data = JSON.parse(saved);
            state.completedDays = data.completedDays || [];
            state.notes = data.notes || {};
          }
        } catch (e) {
          console.log('Storage access failed:', e);
        }
      },
      save() {
        try {
          localStorage.setItem('mobilityAppState', JSON.stringify({
            completedDays: state.completedDays,
            notes: state.notes
          }));
        } catch (e) {
          console.log('Storage save failed:', e);
        }
      }
    };

    // Audio helpers
    const Audio = {
      init() {
        if (!state.audioContext) {
          try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            state.audioContext = new AudioContext();
          } catch (e) {
            console.log('AudioContext not available');
          }
        }
      },
      tick() {
        if (!state.audioContext) return;
        const ctx = state.audioContext;
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 800;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
      },
      chime() {
        if (!state.audioContext) return;
        const ctx = state.audioContext;
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(1000, now);
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.3);
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.3);
      },
      complete() {
        if (!state.audioContext) return;
        const ctx = state.audioContext;
        const now = ctx.currentTime;
        const notes = [523, 659, 784];
        notes.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = freq;
          osc.type = 'sine';
          gain.gain.setValueAtTime(0.1, now + i * 0.05);
          gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.05 + 0.3);
          osc.start(now + i * 0.05);
          osc.stop(now + i * 0.05 + 0.3);
        });
      }
    };

      const animations = {

    // Get today's session
    function getTodaySession() {
      const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
      return SESSIONS[dayOfYear % SESSIONS.length];
    }

    // Calculate stats
    function getStats() {
      let dayStreak = 0;
      let today = new Date();
      today.setHours(0, 0, 0, 0);
      const todayStr = today.toISOString().split('T')[0];

      for (let i = 0; i < 365; i++) {
        const checkDate = new Date(today);
        checkDate.setDate(checkDate.getDate() - i);
        const checkStr = checkDate.toISOString().split('T')[0];
        if (state.completedDays.includes(checkStr)) {
          dayStreak++;
        } else if (i > 0) {
          break;
        }
      }

      let totalMinutes = 0;
      state.completedDays.forEach(dayStr => {
        const dayOfYear = Math.floor((new Date(dayStr) - new Date(new Date(dayStr).getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
        const session = SESSIONS[dayOfYear % SESSIONS.length];
        session.exercises.forEach(ex => {
          totalMinutes += Math.ceil(ex.duration / 60);
        });
      });

      return {
        dayStreak,
        totalSessions: state.completedDays.length,
        totalMinutes
      };
    }

    // Get last 7 days
    function getLastSevenDays() {
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        date.setHours(0, 0, 0, 0);
        const dateStr = date.toISOString().split('T')[0];
        days.push({
          date: dateStr,
          completed: state.completedDays.includes(dateStr),
          dayOfWeek: date.toLocaleDateString('en', { weekday: 'short' }).toUpperCase().charAt(0)
        });
      }
      return days;
    }

    function renderToday() {

      document.getElementById('streakValue').textContent = stats.dayStreak;
      document.getElementById('sessionsValue').textContent = stats.totalSessions;
      document.getElementById('minutesValue').textContent = stats.totalMinutes;

      const lastSeven = getLastSevenDays();
      document.getElementById('weekMiniCal').innerHTML = lastSeven.map((day, idx) => `
        <div class="day-box ${day.completed ? 'completed' : ''} ${idx === 6 ? 'today' : ''}">
          ${day.dayOfWeek}
        </div>
      `).join('');

      const todaySession = getTodaySession();
      const totalDuration = todaySession.exercises.reduce((sum, ex) => {
        const sides = ex.sides ? 2 : 1;
        return sum + (ex.duration * sides);
      }, 0);
      const totalMinutes = Math.ceil(totalDuration / 60);

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const todayStr = today.toISOString().split('T')[0];
      const isCompleted = state.completedDays.includes(todayStr);

      document.getElementById('todaySessionCard').innerHTML = `
        <div class="session-header">
          <div class="session-icon">${todaySession.icon}</div>
          <div class="session-title">
            <div class="session-name">${todaySession.name}</div>
            <div class="session-description">${todaySession.description}</div>
          </div>
        </div>
        <div class="exercises-preview">
          ${todaySession.exercises.map(ex => `
            <div class="exercise-item-preview">
              <span>${ex.name}</span>
              <span class="exercise-duration">${ex.duration}s${ex.sides ? ' x 2' : ''}</span>
            </div>
          `).join('')}
        </div>
        <div style="background: #0f0f0f; border-radius: 12px; padding: 12px; text-align: center; margin-bottom: 16px; font-size: 13px; color: #999;">
          Total: ${totalMinutes} min
        </div>
        <button class="start-button" id="startSessionBtn" ${isCompleted ? 'style="opacity: 0.7;"' : ''}>
          ${isCompleted ? '✓ Completed Today' : 'Start Session'}
        </button>
      `;

      const notesArea = document.getElementById('notesTextarea');
      notesArea.value = state.notes[todayStr] || '';
      notesArea.addEventListener('input', (e) => {
        state.notes[todayStr] = e.target.value;
        Storage.save();
      });

      document.getElementById('startSessionBtn').addEventListener('click', startSession);
    }

    function renderCalendar() {
      const year = state.currentMonth.getFullYear();
      const month = state.currentMonth.getMonth();
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const daysInMonth = lastDay.getDate();
      const startingDayOfWeek = firstDay.getDay();

      document.getElementById('monthTitle').textContent = state.currentMonth.toLocaleDateString('en', { month: 'long', year: 'numeric' });

      const monthStats = { sessions: 0, minutes: 0 };
      const calendarGrid = [];

      for (let i = 0; i < startingDayOfWeek; i++) {
        calendarGrid.push(`<div class="calendar-day other-month"></div>`);
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const todayStr = today.toISOString().split('T')[0];

      for (let i = 1; i <= daysInMonth; i++) {
        const date = new Date(year, month, i);
        date.setHours(0, 0, 0, 0);
        const dateStr = date.toISOString().split('T')[0];
        const isCompleted = state.completedDays.includes(dateStr);
        const isToday = dateStr === todayStr;

        if (isCompleted) {
          const dayOfYear = Math.floor((new Date(dateStr) - new Date(new Date(dateStr).getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
          const session = SESSIONS[dayOfYear % SESSIONS.length];
          const sessionMinutes = Math.ceil(session.exercises.reduce((sum, ex) => sum + ex.duration * (ex.sides ? 2 : 1), 0) / 60);
          monthStats.sessions++;
          monthStats.minutes += sessionMinutes;
        }

        calendarGrid.push(`
          <div class="calendar-day ${isCompleted ? 'completed' : ''} ${isToday ? 'today' : ''}">
            ${i}
          </div>
        `);
      }

      document.getElementById('calendarGrid').innerHTML = calendarGrid.join('');
      document.getElementById('calSessions').textContent = monthStats.sessions;
      document.getElementById('calMinutes').textContent = monthStats.minutes;
    }

    function renderHistory() {
      const sortedDays = [...state.completedDays].reverse();
      const historyItems = sortedDays.slice(0, 30).map(dayStr => {
        const date = new Date(dayStr + 'T00:00:00');
        const dayOfYear = Math.floor((new Date(dayStr) - new Date(new Date(dayStr).getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
        const session = SESSIONS[dayOfYear % SESSIONS.length];
        const note = state.notes[dayStr];
        return `
          <div class="history-item">
            <div class="history-date">${date.toLocaleDateString('en', { month: 'short', day: 'numeric', weekday: 'short' })}</div>
            <div class="history-session">${session.icon} ${session.name}</div>
            ${note ? `<div class="history-note">"${note}"</div>` : ''}
          </div>
        `;
      });

      document.getElementById('historyList').innerHTML = historyItems.length > 0
        ? historyItems.join('')
        : '<div style="text-align: center; padding: 40px 20px; color: #999;">No completed sessions yet. Start one today!</div>';
    }

    // Session logic
    function startSession() {
      Audio.init();
      state.currentSession = getTodaySession();
      state.currentExerciseIndex = 0;
      state.currentSideIndex = 0;
      state.isPlaying = true;

      document.getElementById('sessionOverlay').classList.add('active');
      document.body.style.overflow = 'hidden';

      const firstExercise = state.currentSession.exercises[0];
      state.timeRemaining = firstExercise.duration;

      renderSessionContent();
      startTimer();
      Audio.chime();

      if (navigator.wakeLock) {
        try {
          navigator.wakeLock.request('screen');
        } catch (e) {
          console.log('Wake lock failed:', e);
        }
      }
    }

    function renderSessionContent() {
      const exercise = state.currentSession.exercises[state.currentExerciseIndex];
      const totalExercises = state.currentSession.exercises.reduce((sum, ex) => sum + (ex.sides ? 2 : 1), 0);
      let currentStep = 1;
      for (let i = 0; i < state.currentExerciseIndex; i++) {
        currentStep += state.currentSession.exercises[i].sides ? 2 : 1;
      }
      currentStep += state.currentSideIndex;

      const animClass = getAnimationClass(exercise.name);
      const sideCue = exercise.sides ? exercise.sideCue[state.currentSideIndex] : '';
      const cue = exercise.cue;

      let nextExerciseName = '';
      if (state.currentExerciseIndex < state.currentSession.exercises.length - 1) {
        nextExerciseName = state.currentSession.exercises[state.currentExerciseIndex + 1].name;
      } else if (state.currentSideIndex + 1 < (exercise.sides ? 2 : 1)) {
        nextExerciseName = exercise.name;
      }

      const timerColor = state.currentSession.color;

      document.getElementById('sessionProgress').textContent = `${currentStep} / ${totalExercises}`;
      document.getElementById('sessionContent').innerHTML = `
        ${createStickFigure(animClass)}
        <div class="timer-container">
          <svg class="timer-svg" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="45" fill="none" stroke="#2a2a2a" stroke-width="2" />
            <circle id="timerCircle" cx="50" cy="50" r="45" fill="none" stroke="${timerColor}" stroke-width="2" stroke-dasharray="282.74" stroke-dashoffset="282.74" stroke-linecap="round" />
          </svg>
          <div class="timer-text" id="timerText">${state.timeRemaining}</div>
          <div class="timer-label">seconds</div>
        </div>
        <div class="exercise-name">${exercise.name}</div>
        <div class="exercise-side">${sideCue}</div>
        <div class="exercise-cue">${cue}</div>
        <div class="exercise-up-next">${nextExerciseName ? 'Up next: ' + nextExerciseName : 'Final stretch!'}</div>
        <div class="controls">
          <button class="control-btn" id="prevBtn">❮</button>
          <button class="control-btn play-btn" id="playBtn">${state.isPlaying ? '⏸' : '▶'}</button>
          <button class="control-btn" id="skipBtn">❯</button>
        </div>
      `;

      document.getElementById('prevBtn').addEventListener('click', previousExercise);
      document.getElementById('playBtn').addEventListener('click', togglePlay);
      document.getElementById('skipBtn').addEventListener('click', nextExercise);
    }

    function startTimer() {
      if (state.timerInterval) clearInterval(state.timerInterval);

      state.timerInterval = setInterval(() => {
        if (!state.isPlaying) return;

        state.timeRemaining--;
        document.getElementById('timerText').textContent = state.timeRemaining;

        const exercise = state.currentSession.exercises[state.currentExerciseIndex];
        const totalDuration = exercise.duration;
        const circumference = 282.74;
        const offset = circumference * (1 - state.timeRemaining / totalDuration);
        const circle = document.getElementById('timerCircle');
        if (circle) {
          circle.style.strokeDashoffset = offset;
        }

        if (state.timeRemaining <= 3 && state.timeRemaining > 0) {
          Audio.tick();
        }

        if (state.timeRemaining === 0) {
          Audio.chime();
          nextExercise();
        }
      }, 1000);
    }

    function togglePlay() {
      state.isPlaying = !state.isPlaying;
      const btn = document.getElementById('playBtn');
      if (btn) {
        btn.textContent = state.isPlaying ? '⏸' : '▶';
      }
      if (state.isPlaying) {
        startTimer();
      } else if (state.timerInterval) {
        clearInterval(state.timerInterval);
      }
    }

    function nextExercise() {
      const exercise = state.currentSession.exercises[state.currentExerciseIndex];
      if (exercise.sides && state.currentSideIndex + 1 < 2) {
        state.currentSideIndex++;
      } else {
        state.currentExerciseIndex++;
        state.currentSideIndex = 0;

        if (state.currentExerciseIndex >= state.currentSession.exercises.length) {
          completeSession();
          return;
        }
      }

      const nextEx = state.currentSession.exercises[state.currentExerciseIndex];
      state.timeRemaining = nextEx.duration;
      renderSessionContent();
      if (state.isPlaying) startTimer();
    }

    function previousExercise() {
      if (state.currentSideIndex > 0) {
        state.currentSideIndex--;
      } else if (state.currentExerciseIndex > 0) {
        state.currentExerciseIndex--;
        const prevEx = state.currentSession.exercises[state.currentExerciseIndex];
        state.currentSideIndex = prevEx.sides ? 1 : 0;
      } else {
        return;
      }

      const prevEx = state.currentSession.exercises[state.currentExerciseIndex];
      state.timeRemaining = prevEx.duration;
      renderSessionContent();
      if (state.isPlaying) startTimer();
    }

    function completeSession() {
      if (state.timerInterval) clearInterval(state.timerInterval);

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const todayStr = today.toISOString().split('T')[0];

      if (!state.completedDays.includes(todayStr)) {
        state.completedDays.push(todayStr);
      }
      Storage.save();

      Audio.complete();

      const totalDuration = state.currentSession.exercises.reduce((sum, ex) => {
        return sum + (ex.duration * (ex.sides ? 2 : 1));
      }, 0);
      const totalMinutes = Math.ceil(totalDuration / 60);

      document.getElementById('sessionContent').innerHTML = `
        <div class="session-complete">
          <div class="complete-emoji">🎉</div>
          <div class="complete-title">Awesome Work!</div>
          <div style="font-size: 14px; color: #999; margin-bottom: 24px;">${state.currentSession.name}</div>
          <div class="complete-stats">
            <div class="complete-stat-line">
              <span class="complete-stat-label">Duration</span>
              <span class="complete-stat-value">${totalMinutes} min</span>
            </div>
            <div class="complete-stat-line">
              <span class="complete-stat-label">Exercises</span>
              <span class="complete-stat-value">${state.currentSession.exercises.length}</span>
            </div>
            <div class="complete-stat-line">
              <span class="complete-stat-label">Streak</span>
              <span class="complete-stat-value">${getStats().dayStreak} days 🔥</span>
            </div>
          </div>
          <button class="complete-btn" id="completeBtn">Done</button>
        </div>
      `;

      document.getElementById('completeBtn').addEventListener('click', closeSession);
    }

    function closeSession() {
      if (state.timerInterval) clearInterval(state.timerInterval);
      state.currentSession = null;
      document.getElementById('sessionOverlay').classList.remove('active');
      document.body.style.overflow = '';
      renderToday();
      renderCalendar();
      renderHistory();
    }

    // Navigation
    function switchTab(tabId) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');

      document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');

      if (tabId === 'calendarTab') renderCalendar();
      if (tabId === 'historyTab') renderHistory();
    }

    document.getElementById('todayNav').addEventListener('click', () => switchTab('todayTab'));
    document.getElementById('calendarNav').addEventListener('click', () => switchTab('calendarTab'));
    document.getElementById('historyNav').addEventListener('click', () => switchTab('historyTab'));

    document.getElementById('prevMonthBtn').addEventListener('click', () => {
      state.currentMonth.setMonth(state.currentMonth.getMonth() - 1);
      renderCalendar();
    });

    document.getElementById('nextMonthBtn').addEventListener('click', () => {
      state.currentMonth.setMonth(state.currentMonth.getMonth() + 1);
      renderCalendar();
    });

    document.getElementById('sessionCloseBtn').addEventListener('click', closeSession);

    // Init
    Storage.load();
    renderToday();
  </script>
</body>
</html>
